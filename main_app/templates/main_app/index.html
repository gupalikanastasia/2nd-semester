{% extends 'main_app/base.html' %}

{% block content %}
    <h2>{{ title }}</h2>
    <p>{{ content }}</p>

    {% for item in items %}
        <div class="item-card">
            <h3>{{ item.name }} — {{ item.price }} грн</h3>
            <p>{{ item.description }}</p>
        </div>
    {% empty %}
        <p>Тут поки порожньо.</p>
    {% endfor %}
{% endblock %}

{% extends 'main_app/base.html' %}
{% block content %}
<div class="auth-section">
    <h2>Відновлення пароля</h2>
    <p>Введіть вашу пошту, і ми надішлемо вам інструкції.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="auth-btn">Надіслати лист</button>
    </form>
</div>
{% endblock %}

{% extends 'main_app/base.html' %}
{% block content %}
<div class="auth-section">
    <h2>Новий пароль</h2>
    <p>Будь ласка, введіть та підтвердіть ваш новий пароль.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="auth-btn">Змінити пароль</button>
    </form>
</div>
{% endblock %}

{% extends 'main_app/base.html' %}
{% block content %}
<div class="pandy-container--small">
    <div class="pandy-card">
        <h2 class="pandy-card__title">Вхід</h2>
        <form method="post" class="pandy-form">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="pandy-form__extra">
                <a href="{% url 'password_reset' %}" class="pandy-link--subtle">Забули пароль? 🐼</a>
            </div>
            <button type="submit" class="pandy-btn pandy-btn--main">Продовжити</button>
        </form>
    </div>
</div>
{% endblock %}
